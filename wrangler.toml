name = "senti-bot-worker"
main = "src/index.ts"
compatibility_date = "2024-09-10"
workers_dev = true
node_compat = false

# ПРИВ'ЯЗКИ KV — встав СВОЇ ID з дашборду Cloudflare
[[kv_namespaces]]
binding = "SENTI_CACHE"
id = "PASTE_SENTI_CACHE_ID"

[[kv_namespaces]]
binding = "LIKES_KV"
id = "PASTE_LIKES_KV_ID"

[[kv_namespaces]]
binding = "DEDUP_KV"
id = "PASTE_DEDUP_KV_ID"