name = "senti-bot-worker"
main = "src/index.ts"

# твій акаунт
account_id = "2cf6e316af8623546c95c0354bc3aa00"

# Workers runtime
compatibility_date = "2024-10-04"
compatibility_flags = ["nodejs_compat"]

# Уникаємо перезапису змінних/секретів з Dashboard
keep_vars = true

# 🔗 Увімкнути Workers AI в цьому воркері
[ai]
binding = "AI"

# Якщо KV уже прив'язані через Dashboard — цей блок можна НЕ додавати.
