# wrangler.toml — стабільний шаблон
name = "senti-bot-worker"
main = "src/index.ts"
workers_dev = true

# 🔒 Обовʼязково змініть на свій
account_id = "<YOUR_CLOUDFLARE_ACCOUNT_ID>"

# Стабільна дата сумісності
compatibility_date = "2024-09-01"

minify = false

# ===== KV namespaces =====
# Створіть свою namespace у Cloudflare → KV, вставте ID нижче
[[kv_namespaces]]
binding = "LIKES_KV"
id = "<YOUR_PROD_KV_ID>"
preview_id = "<YOUR_PREVIEW_KV_ID>"

# ===== Observability (free план: вимкнено) =====
[observability]
enabled = false

# ===== Dev (локально/preview, опційно) =====
[dev]
port = 8787
local_protocol = "https"

# ===== (опційно) маршрути під свою зону =====
# [routes]
# pattern = "bot.example.com/webhook*"
# zone_id = "<YOUR_ZONE_ID>"