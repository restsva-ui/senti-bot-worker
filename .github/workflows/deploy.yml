name: Deploy Senti Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  SCRIPT_NAME: senti-bot-worker

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Перевіряємо, чи задані потрібні секрети в GitHub
      - name: Sanity check required secrets
        run: |
          : "${{ secrets.CF_API_TOKEN?CF_API_TOKEN is required }}"
          : "${{ secrets.CF_ACCOUNT_ID?CF_ACCOUNT_ID is required }}"

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --name ${{ env.SCRIPT_NAME }}

      # Health-check
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Get workers.dev subdomain
        id: sub
        run: |
          resp=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/subdomain")
          sub=$(echo "$resp" | jq -r '.result.subdomain')
          echo "subdomain=$sub" >> "$GITHUB_OUTPUT"

      - name: Health check (non-blocking)
        run: |
          curl -fsS "https://${{ env.SCRIPT_NAME }}.${{ steps.sub.outputs.subdomain }}.workers.dev/health" || true