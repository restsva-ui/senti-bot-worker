name: Deploy Senti Worker

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-senti-worker
  cancel-in-progress: true

env:
  SCRIPT_NAME: senti-bot-worker
  # читаємо токен прямо з secrets в env (щоб не світити у степах)
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure entrypoint exists
        run: |
          ls -la
          test -f index.js || { echo "index.js not found"; exit 1; }

      - name: Verify CF token
        run: |
          set -e
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify | jq .

      - name: Install Wrangler
        run: npm i -g wrangler@latest

      # ---------- only-if-missing secrets (idempotent) ----------
      - name: Ensure secrets (create only if missing)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -e

          ensure_secret () {
            KEY="$1"; VALUE="$2"
            echo "Check secret $KEY…"
            # список секретів цього воркера
            LIST=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/${SCRIPT_NAME}/secrets")
            echo "$LIST" | jq -e ".success==true" >/dev/null 2>&1 || LIST="{}"
            EXISTS=$(echo "$LIST" | jq -r --arg k "$KEY" '.result[]?.name | select(.==$k)')
            if [ "$EXISTS" = "$KEY" ]; then
              echo "  -> already exists, skip"
            else
              echo "  -> creating…"
              printf "%s" "$VALUE" | wrangler secret put "$KEY" --name "$SCRIPT_NAME"
            fi
          }

          ensure_secret "TELEGRAM_BOT_TOKEN" "$TELEGRAM_BOT_TOKEN"
          ensure_secret "WEBHOOK_SECRET" "$WEBHOOK_SECRET"
          ensure_secret "CLOUDFLARE_API_TOKEN" "$CLOUDFLARE_API_TOKEN"

      # ---------- deploy ----------
      - name: Deploy to Cloudflare Workers
        run: wrangler deploy --name "$SCRIPT_NAME"

      # ---------- resolve workers.dev url ----------
      - name: Resolve worker URL
        id: url
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          SUBDOMAIN=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/subdomain" \
            | jq -r '.result.subdomain')
          test -n "$SUBDOMAIN"
          echo "WORKER_URL=https://${{ env.SCRIPT_NAME }}.${SUBDOMAIN}.workers.dev" >> $GITHUB_OUTPUT
          echo "Worker URL: https://${{ env.SCRIPT_NAME }}.${SUBDOMAIN}.workers.dev"

      - name: Healthcheck
        run: |
          URL="${{ steps.url.outputs.WORKER_URL }}/"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL") || true
            echo "Try #$i: $CODE"
            [ "$CODE" -eq 200 ] && break
            sleep 2
          done
          [ "$CODE" -eq 200 ] || (echo "healthcheck failed" && exit 1)

      # ---------- Telegram webhook ----------
      - name: getMe (sanity)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | jq .

      - name: Reset webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook" || true

      - name: Set webhook (retries)
        id: sethook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKER_URL: ${{ steps.url.outputs.WORKER_URL }}
        run: |
          set -e
          TARGET="${WORKER_URL}/webhook"
          echo "Setting to: $TARGET"
          OK=0
          for i in 1 2 3 4 5; do
            RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=$TARGET" \
              --data-urlencode "secret_token=${WEBHOOK_SECRET}")
            echo "$RESP"
            echo "$RESP" | jq -e '.ok==true' >/dev/null 2>&1 && { OK=1; break; }
            sleep 2
          done
          [ "$OK" -eq 1 ] || (echo "setWebhook failed" && exit 1)
          echo "HOOK_URL=$TARGET" >> $GITHUB_OUTPUT

      - name: Check webhookInfo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EXPECTED: ${{ steps.sethook.outputs.HOOK_URL }}
        run: |
          INFO=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo")
          echo "$INFO" | jq .
          echo "$INFO" | grep -q "\"url\":\"$EXPECTED\"" || (echo "webhook url mismatch" && exit 1)

      - name: Smoke /webhook
        env:
          WORKER_URL: ${{ steps.url.outputs.WORKER_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -e
          BODY='{"update_id":1,"message":{"message_id":1,"chat":{"id":12345},"text":"/start"}}'
          curl -s -o /tmp/out.txt -w "HTTP:%{http_code}\n" -X POST "${WORKER_URL}/webhook" \
            -H "Content-Type: application/json" \
            -H "X-Telegram-Bot-Api-Secret-Token: ${WEBHOOK_SECRET}" \
            --data "$BODY"
          echo "Response:"; cat /tmp/out.txt

      - name: Final info
        run: |
          echo "Worker URL: ${{ steps.url.outputs.WORKER_URL }}"
          echo "Webhook:    ${{ steps.sethook.outputs.HOOK_URL }}"