name: Deploy Senti Worker

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-senti-worker
  cancel-in-progress: true

env:
  SCRIPT_NAME: senti-bot-worker
  # Робимо токен доступним для всіх кроків wrangler
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 0) Перевіримо, що secrets реально підтягуються (довжину, не значення)
      - name: Debug secrets length
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "CLOUDFLARE_API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
          echo "TELEGRAM_BOT_TOKEN length: ${#TELEGRAM_BOT_TOKEN}"
          echo "WEBHOOK_SECRET length: ${#WEBHOOK_SECRET}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

      # 1) Перевірка валідності CF токена
      - name: Verify Cloudflare API token
        run: |
          set -e
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify
          echo
          echo "OK: Cloudflare API token verified"

      # 2) Встановлюємо wrangler
      - name: Install Wrangler
        run: npm i -g wrangler@latest

      # 3) Прописуємо секрети у Worker (⚠️ лише --name; account_id з wrangler.toml)
      - name: Put Worker secrets (Telegram, webhook, CF token for AI)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          echo -n "$TELEGRAM_BOT_TOKEN" | wrangler secret put TELEGRAM_BOT_TOKEN --name "$SCRIPT_NAME"
          echo -n "$WEBHOOK_SECRET"     | wrangler secret put WEBHOOK_SECRET     --name "$SCRIPT_NAME"
          echo -n "$CLOUDFLARE_API_TOKEN" | wrangler secret put CLOUDFLARE_API_TOKEN --name "$SCRIPT_NAME"

      # 4) Деплой (account_id береться з wrangler.toml)
      - name: Publish to Cloudflare Workers
        id: deploy
        run: |
          set -e
          wrangler deploy --name "$SCRIPT_NAME"

      # 5) Отримаємо workers.dev subdomain з Cloudflare API і зберемо URL
      - name: Resolve workers.dev URL
        id: url
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          SUBDOMAIN=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | sed -n 's/.*"subdomain":"\([^"]*\)".*/\1/p')
          if [ -z "$SUBDOMAIN" ]; then
            echo "Failed to resolve workers subdomain"; exit 1
          fi
          URL="https://${SCRIPT_NAME}.${SUBDOMAIN}.workers.dev"
          echo "WORKER_URL=$URL" >> $GITHUB_OUTPUT
          echo "Resolved Worker URL: $URL"

      # 6) Healthcheck /
      - name: Healthcheck worker
        run: |
          set -e
          curl -sS "${{ steps.url.outputs.WORKER_URL }}/" | head -n 1

      # 7) Перевіримо валідність Telegram токена
      - name: Telegram getMe (token sanity check)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -e
          RESP=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe")
          echo "getMe: $RESP"
          echo "$RESP" | grep -q '"ok":true' || { echo "Telegram token invalid (getMe failed)"; exit 1; }

      # 8) Виставляємо Telegram webhook з секретом
      - name: Set Telegram webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKER_URL: ${{ steps.url.outputs.WORKER_URL }}
        run: |
          set -e
          echo "Setting webhook to: ${WORKER_URL}/webhook"
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            --data-urlencode "url=${WORKER_URL}/webhook" \
            --data-urlencode "secret_token=${WEBHOOK_SECRET}")
          echo "setWebhook response: $RESP"
          echo "$RESP" | grep -q '"ok":true' || exit 1

      # 9) Смоук вебхука: /start напряму (імітуємо Telegram)
      - name: Smoke test webhook (/start)
        env:
          WORKER_URL: ${{ steps.url.outputs.WORKER_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -e
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST "${WORKER_URL}/webhook" \
            -H "content-type: application/json" \
            -H "X-Telegram-Bot-Api-Secret-Token: ${WEBHOOK_SECRET}" \
            --data '{"update_id":1,"message":{"message_id":1,"chat":{"id":123},"text":"/start"}}')
          echo "Status: $HTTP_CODE"
          echo "Body:"; cat /tmp/body.txt
          test "$HTTP_CODE" -eq 200
          grep -q 'ok' /tmp/body.txt

      # 10) Фінальна підказка
      - name: Show final info
        run: |
          echo "Worker: ${{ steps.url.outputs.WORKER_URL }}"
          echo "Verify webhook:"
          echo "  curl -s \"https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo\""