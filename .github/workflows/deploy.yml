name: Deploy Senti Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Заздалегідь задаємо відомі назви, щоб не гадати URL:
      SCRIPT_NAME:           ${{ secrets.SCRIPT_NAME }}
      WORKERS_SUBDOMAIN:     ${{ secrets.WORKERS_SUBDOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Wrangler version
        run: npx wrangler@latest --version

      - name: Deploy Worker
        run: npx wrangler@latest deploy

      - name: Upsert Cloudflare Worker secrets
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET:     ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          upsert() {
            local key="$1"; local value="${2:-}"
            if [ -z "${value}" ]; then
              echo "::notice title=Skip::Secret ${key} is empty, skipping"
              return 0
            fi
            printf '%s' "${value}" | npx wrangler@latest secret put "${key}" --yes
            echo "::notice title=Secret::${key} upserted"
          }
          upsert "TELEGRAM_BOT_TOKEN" "${TELEGRAM_BOT_TOKEN:-}"
          upsert "WEBHOOK_SECRET"     "${WEBHOOK_SECRET:-}"

      # --- опційно: одразу поставити Telegram вебхук і показати його стан
      - name: Set Telegram webhook (optional but recommended)
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.WEBHOOK_SECRET != '' && secrets.WORKERS_SUBDOMAIN != '' && secrets.SCRIPT_NAME != '' }}
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET:     ${{ secrets.WEBHOOK_SECRET }}
          WORKERS_SUBDOMAIN:  ${{ secrets.WORKERS_SUBDOMAIN }}
          SCRIPT_NAME:        ${{ secrets.SCRIPT_NAME }}
        run: |
          set -euo pipefail
          URL="https://${SCRIPT_NAME}.${WORKERS_SUBDOMAIN}.workers.dev/webhook"
          echo "Setting webhook to: ${URL}"
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook?drop_pending_updates=true" >/dev/null
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
            -d "url=${URL}" \
            -d "secret_token=${WEBHOOK_SECRET}"

          echo "--- getWebhookInfo ---"
          curl -fsS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo" | jq .

      # Надійний smoke-check: використовує відомий URL; 404/403 на /health допускаємо
      - name: Smoke check
        shell: bash
        continue-on-error: true
        env:
          WORKERS_SUBDOMAIN:  ${{ secrets.WORKERS_SUBDOMAIN }}
          SCRIPT_NAME:        ${{ secrets.SCRIPT_NAME }}
        run: |
          set -euo pipefail
          URL="https://${SCRIPT_NAME}.${WORKERS_SUBDOMAIN}.workers.dev"
          echo "Pinging ${URL}/health ..."
          # будь-який код відповіді виводимо, але не фейлимо job
          curl -i -m 10 "${URL}/health" || true