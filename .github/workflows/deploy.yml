name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ "main" ]   # якщо деплоїш з іншої гілки — зміни тут
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm i -g wrangler@4

      - name: Print Wrangler version
        run: wrangler --version

      - name: Cloudflare whoami (checks token & account)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler whoami --verbose

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler deploy --config wrangler.toml --keep-vars true --verbose
          echo "Deploy finished at $(date -u)"