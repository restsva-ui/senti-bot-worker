name: Cloudflare Worker / deploy (wrangler v3)

on:
  push:
    branches: [ main ]         # автодеплой на кожен пуш у main
  workflow_dispatch:           # можливість запустити руками з Actions

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Якщо у репо є package.json — встановимо залежності (без падіння, якщо lock-файла нема)
      - name: Install deps (if any)
        if: ${{ hashFiles('package.json') != '' }}
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Deploy with Wrangler v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Використовуємо саме v3 і без --log-level
          npx -y wrangler@3 deploy --config wrangler.toml --keep-vars true