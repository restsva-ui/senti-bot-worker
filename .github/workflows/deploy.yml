name: Deploy Senti Worker

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-senti-worker
  cancel-in-progress: true

env:
  SCRIPT_NAME: senti-bot-worker
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 0) Перевіряємо наявність секретів (довжина, не значення)
      - name: Debug secrets length
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "CLOUDFLARE_API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
          echo "TELEGRAM_BOT_TOKEN length: ${#TELEGRAM_BOT_TOKEN}"
          echo "WEBHOOK_SECRET length: ${#WEBHOOK_SECRET}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

      # 1) Верифікуємо токен Cloudflare
      - name: Verify Cloudflare API token
        run: |
          set -e
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify
          echo
          echo "OK: Cloudflare API token verified"

      # 2) Встановлюємо wrangler
      - name: Install Wrangler
        run: npm i -g wrangler@latest

      # 3) Записуємо секрети у Worker (⚠️ ТІЛЬКИ --name)
      - name: Put Worker secrets (Telegram, webhook, CF token for AI)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -e
          echo -n "$TELEGRAM_BOT_TOKEN"     | wrangler secret put TELEGRAM_BOT_TOKEN     --name "$SCRIPT_NAME"
          echo -n "$WEBHOOK_SECRET"         | wrangler secret put WEBHOOK_SECRET         --name "$SCRIPT_NAME"
          echo -n "$CLOUDFLARE_API_TOKEN"   | wrangler secret put CLOUDFLARE_API_TOKEN   --name "$SCRIPT_NAME"

      # 4) Деплоїмо (account_id з wrangler.toml)
      - name: Publish to Cloudflare Workers
        id: deploy
        run: |
          set -e
          wrangler deploy --name "$SCRIPT_NAME"
          echo "DEPLOY_DONE=1" >> $GITHUB_OUTPUT

      # 5) Формуємо коректний workers.dev URL через API (без парсингу логів)
      - name: Resolve workers.dev URL
        id: url
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          SUBDOMAIN=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" \
            | sed -n 's/.*"subdomain":"\([^"]*\)".*/\1/p')
          test -n "$SUBDOMAIN"
          URL="https://${{ env.SCRIPT_NAME }}.${SUBDOMAIN}.workers.dev"
          echo "WORKER_URL=$URL" >> $GITHUB_OUTPUT
          echo "Resolved Worker URL: $URL"

      # 6) Healthcheck / з ретраями (щоб дочекатись прогріву)
      - name: Healthcheck worker (with retries)
        run: |
          set -e
          URL="${{ steps.url.outputs.WORKER_URL }}/"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL") || true
            echo "Try #$i: $CODE"
            test "$CODE" -eq 200 && break
            sleep 3
          done
          test "$CODE" -eq 200
          curl -sS "$URL" | head -n 1

      # 7) Перевірка валідності Telegram токена ДО setWebhook
      - name: Telegram getMe (token sanity check)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -e
          RESP=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe")
          echo "getMe: $RESP"
          echo "$RESP" | grep -q '"ok":true' || { echo "Telegram token invalid (getMe failed)"; exit 1; }

      # 8) Скидаємо старий вебхук (на всяк випадок)
      - name: Telegram deleteWebhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/deleteWebhook" || true

      # 9) Ставимо вебхук з ретраями (чекаємо, якщо DNS/прогрів)
      - name: Set Telegram webhook (with retries)
        id: sethook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          WORKER_URL: ${{ steps.url.outputs.WORKER_URL }}
        run: |
          set -e
          TARGET="${WORKER_URL}/webhook"
          echo "Setting webhook to: $TARGET"
          OK=0
          for i in 1 2 3 4 5; do
            RESP=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook" \
              --data-urlencode "url=$TARGET" \
              --data-urlencode "secret_token=${WEBHOOK_SECRET}")
            echo "Attempt #$i: $RESP"
            echo "$RESP" | grep -q '"ok":true' && { OK=1; break; }
            sleep 3
          done
          test "$OK" -eq 1
          echo "HOOK_URL=$TARGET" >> $GITHUB_OUTPUT

      # 10) Перевіряємо webhookInfo (чи точно той URL)
      - name: Telegram getWebhookInfo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EXPECTED: ${{ steps.sethook.outputs.HOOK_URL }}
        run: |
          set -e
          INFO=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo")
          echo "webhookInfo: $INFO"
          echo "$INFO" | grep -q '"ok":true'
          echo "$INFO" | grep -q "\"url\":\"$EXPECTED\""

      # 11) Смоук /webhook: /start (імітація Telegram)
      - name: Smoke test webhook (/start)
        env:
          WORKER_URL: ${{ steps.url.outputs.WORKER_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -e
          BODY='{"update_id":1,"message":{"message_id":1,"chat":{"id":123},"text":"/start"}}'
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST "${WORKER_URL}/webhook" \
            -H "content-type: application/json" \
            -H "X-Telegram-Bot-Api-Secret-Token: ${WEBHOOK_SECRET}" \
            --data "$BODY")
          echo "Status: $HTTP_CODE"
          echo "Body:"; cat /tmp/body.txt
          test "$HTTP_CODE" -eq 200
          grep -q 'ok' /tmp/body.txt

      # 12) Фінальна інфа
      - name: Show final info
        run: |
          echo "Worker URL: ${{ steps.url.outputs.WORKER_URL }}"
          echo "Webhook URL: ${{ steps.sethook.outputs.HOOK_URL }}"
          echo "Check in Telegram:"
          echo "  https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo"