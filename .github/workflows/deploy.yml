name: Deploy Senti Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: deploy-senti-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm i -g wrangler@latest

      - name: Verify inputs
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$TELEGRAM_BOT_TOKEN"

      - name: Put Cloudflare Worker secrets
        run: |
          echo -n "$TELEGRAM_BOT_TOKEN" | wrangler secret put TELEGRAM_BOT_TOKEN --yes --account-id "$CLOUDFLARE_ACCOUNT_ID"
          echo -n "senti1984"        | wrangler secret put WEBHOOK_SECRET     --yes --account-id "$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy to Cloudflare Workers
        id: deploy
        run: |
          set -e
          wrangler deploy --account-id "$CLOUDFLARE_ACCOUNT_ID" 2>&1 | tee /tmp/deploy.log
          URL=$(grep -Eo 'https://[a-z0-9-]+\.workers\.dev' /tmp/deploy.log | tail -1 || true)
          echo "WORKER_URL=$URL" >> $GITHUB_OUTPUT
          echo "Deployed URL: $URL"

      - name: Set Telegram webhook
        if: steps.deploy.outputs.WORKER_URL != ''
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/setWebhook?url=${{ steps.deploy.outputs.WORKER_URL }}/webhook&secret_token=senti1984"

      - name: Smoke test webhook (/start)
        if: steps.deploy.outputs.WORKER_URL != ''
        run: |
          set -e
          curl -i -s -X POST "${{ steps.deploy.outputs.WORKER_URL }}/webhook" \
            -H "content-type: application/json" \
            -H "X-Telegram-Bot-Api-Secret-Token: senti1984" \
            --data '{"update_id":1,"message":{"message_id":1,"chat":{"id":123},"text":"/start"}}' | head -n 20

      - name: Show final info
        run: |
          echo "Worker: ${{ steps.deploy.outputs.WORKER_URL }}"
          echo "To verify webhook:"
          echo "curl -s \"https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo\""