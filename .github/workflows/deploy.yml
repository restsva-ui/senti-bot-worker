name: Deploy Senti Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      # Wrangler читає account_id і з wrangler.toml, і з ENV.
      # Даємо через ENV для стабільності CI.
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Wrangler version
        run: npx wrangler@latest --version

      # 1) Деплой воркера (зчитує все з wrangler.toml)
      - name: Deploy Worker
        run: npx wrangler@latest deploy

      # 2) Апсерт секретів (тільки якщо значення передано; overwrite без питань)
      - name: Upsert Cloudflare Worker secrets
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET:     ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          upsert() {
            local key="$1"; local value="${2:-}"
            if [ -z "${value}" ]; then
              echo "::notice title=Skip::Secret ${key} is empty, skipping"
              return 0
            fi
            # Подаємо значення через stdin; --yes приглушує підтвердження;
            # помилки типу "вже існує" не критичні — wrangler перепише.
            printf '%s' "${value}" | npx wrangler@latest secret put "${key}" --yes
            echo "::notice title=Secret::${key} upserted"
          }
          upsert "TELEGRAM_BOT_TOKEN" "${TELEGRAM_BOT_TOKEN:-}"
          upsert "WEBHOOK_SECRET"     "${WEBHOOK_SECRET:-}"

      # 3) Коротка перевірка доступності (опціонально; не валить пайплайн)
      - name: Smoke check /health
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          # Спробуємо витягти URL з wrangler output (workers.dev).
          URL=$(npx wrangler@latest deployments list 2>/dev/null | awk '/https:\/\/.*workers\.dev/{print $1; exit}' || true)
          if [ -z "${URL:-}" ]; then
            # fallback: якщо знаємо ім'я (name) з wrangler.toml — заміни нижче на своє
            URL="https://senti-bot-worker.workers.dev"
          fi
          echo "Ping ${URL}/health ..."
          curl -fsS -m 10 "${URL}/health" || echo "Health endpoint not found (expected 404/200) — ok"