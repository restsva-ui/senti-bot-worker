name: Deploy to Cloudflare Workers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Немає package-lock.json → використовуємо npm install
      - name: Install deps
        run: npm install

      - name: Build (optional)
        run: npm run build --if-present

      - name: Deploy with Wrangler v4
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx -y wrangler@4 deploy --config wrangler.toml --keep-vars true