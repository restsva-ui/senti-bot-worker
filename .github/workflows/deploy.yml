name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "wrangler.toml"
      - "package.json"
      - "tsconfig.json"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm i -g wrangler@4.42.0

      # Якщо у тебе немає package.json — цей крок просто нічого не зробить
      - name: Install deps (optional)
        run: |
          if [ -f package.json ]; then
            npm ci || npm i
          fi

      # ⚠️ ВАЖЛИВО: НЕ КЛАДЕМО секрети через CLI (щоб не ловити помилок).
      # Секрети задаються в Dashboard (або вже існують).
      # Тут лише деплоїмо з тим, що є в wrangler.toml + Dashboard.

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # wrangler візьме account_id з wrangler.toml
          # --keep-vars лишає змінні/секрети з Dashboard
          wrangler deploy --keep-vars