name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Cloudflare whoami (optional)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler whoami || true

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          wrangler deploy --config wrangler.toml --keep-vars true
          echo "Deploy finished at $(date -u)"

      # --- Після деплою: скинемо і поставимо мінімальний набір команд бота ---
      - name: Set bot commands (ping, ask, help)
        if: ${{ secrets.BOT_TOKEN != '' }}
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -e
          API="https://api.telegram.org/bot${BOT_TOKEN}"
          # повне очищення глобальних команд
          curl -sS -X POST "$API/setMyCommands" -d 'commands=[]' > /dev/null
          # мінімальний список
          CMDS='[{"command":"ping","description":"connectivity check"},{"command":"ask","description":"question to the model"},{"command":"help","description":"this list"}]'
          curl -sS -X POST "$API/setMyCommands" -d "commands=$CMDS" > /dev/null