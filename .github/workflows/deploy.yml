- name: Reset ALL bot commands (scopes + languages)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          API="https://api.telegram.org/bot${BOT_TOKEN}"
          # повне очищення у всіх основних scope
          curl -s -X POST "$API/setMyCommands" -d 'commands=[]' > /dev/null
          curl -s -X POST "$API/setMyCommands" -d 'scope={"type":"all_private_chats"}&commands=[]' > /dev/null
          curl -s -X POST "$API/setMyCommands" -d 'scope={"type":"all_group_chats"}&commands=[]' > /dev/null
          curl -s -X POST "$API/setMyCommands" -d 'scope={"type":"all_chat_administrators"}&commands=[]' > /dev/null
          # якщо колись задавали мовні списки — чистимо теж
          curl -s -X POST "$API/setMyCommands" -d 'language_code=uk&commands=[]' > /dev/null
          curl -s -X POST "$API/setMyCommands" -d 'language_code=en&commands=[]' > /dev/null

      - name: Set minimal command list (ask, ping, help)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          API="https://api.telegram.org/bot${BOT_TOKEN}"
          CMDS='[{"command":"ask","description":"question to the model"},{"command":"ping","description":"connectivity check"},{"command":"help","description":"this list"}]'
          curl -s -X POST "$API/setMyCommands" -d "commands=${CMDS}" > /dev/null