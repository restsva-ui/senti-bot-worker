name: Deploy Senti Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Дебаг: виводимо, чи секрети передані (довжину, але не самі значення)
      - name: Debug secrets length
        run: |
          echo "Account ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "Token length: ${#CLOUDFLARE_API_TOKEN}"
          echo "Telegram token length: ${#TELEGRAM_BOT_TOKEN}"
          echo "Webhook secret length: ${#WEBHOOK_SECRET}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

      - name: Verify Cloudflare API token
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            https://api.cloudflare.com/client/v4/user/tokens/verify | jq .

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Publish to Cloudflare Workers
        run: |
          wrangler deploy --account-id ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} \
                          --name senti-bot-worker \
                          --compatibility-date=2025-09-19
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}