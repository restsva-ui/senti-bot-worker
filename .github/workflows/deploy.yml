name: Deploy Senti Worker

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-senti-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 0) Перевіримо, що secrets реально підтягуються (довжину, не значення)
      - name: Debug secrets length
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID length: ${#CLOUDFLARE_ACCOUNT_ID}"
          echo "CLOUDFLARE_API_TOKEN length: ${#CLOUDFLARE_API_TOKEN}"
          echo "TELEGRAM_BOT_TOKEN length: ${#TELEGRAM_BOT_TOKEN}"
          echo "WEBHOOK_SECRET length: ${#WEBHOOK_SECRET}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}

      # 1) Перевірка валідності CF токена
      - name: Verify Cloudflare API token
        run: |
          set -e
          curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            https://api.cloudflare.com/client/v4/user/tokens/verify | jq .
          echo "OK: Cloudflare API token verified"

      # 2) Встановлюємо wrangler
      - name: Install Wrangler
        run: npm i -g wrangler@latest

      # 3) Прописуємо секрети у Worker (саме так вони потрапляють у env.* на рантаймі)
      - name: Put Worker secrets (Telegram, webhook, CF token for AI)
        run: |
          echo -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" | wrangler secret put TELEGRAM_BOT_TOKEN --yes --account-id "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo -n "${{ secrets.WEBHOOK_SECRET }}"     | wrangler secret put WEBHOOK_SECRET     --yes --account-id "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler secret put CLOUDFLARE_API_TOKEN --yes --account-id "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

      # 4) Деплой з явним account-id (менше сюрпризів)
      - name: Publish to Cloudflare Workers
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          wrangler deploy --account-id "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" 2>&1 | tee /tmp/deploy.log
          URL=$(grep -Eo 'https://[a-z0-9-]+\.workers\.dev' /tmp/deploy.log | tail -1 || true)
          echo "WORKER_URL=$URL" >> $GITHUB_OUTPUT
          echo "Deployed URL: $URL"
          test -n "$URL"

      # 5) Healthcheck /
      - name: Healthcheck worker
        if: steps.deploy.outputs.WORKER_URL != ''
        run: |
          set -e
          curl -sS "${{ steps.deploy.outputs.WORKER_URL }}/" | head -n 1

      # 6) Виставляємо Telegram webhook з секретом
      - name: Set Telegram webhook
        if: steps.deploy.outputs.WORKER_URL != ''
        run: |
          set -e
          echo "Setting webhook to: ${{ steps.deploy.outputs.WORKER_URL }}/webhook"
          RESP=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/setWebhook" \
            --data-urlencode "url=${{ steps.deploy.outputs.WORKER_URL }}/webhook" \
            --data-urlencode "secret_token=${{ secrets.WEBHOOK_SECRET }}")
          echo "Telegram response: $RESP"
          echo "$RESP" | grep -q '"ok":true' || exit 1

      # 7) Смоук вебхука: /start напряму
      - name: Smoke test webhook (/start)
        if: steps.deploy.outputs.WORKER_URL != ''
        run: |
          set -e
          URL="${{ steps.deploy.outputs.WORKER_URL }}/webhook"
          echo "POST $URL"
          HTTP_CODE=$(curl -s -o /tmp/body.txt -w "%{http_code}" -X POST "$URL" \
            -H "content-type: application/json" \
            -H "X-Telegram-Bot-Api-Secret-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            --data '{"update_id":1,"message":{"message_id":1,"chat":{"id":123},"text":"/start"}}')
          echo "Status: $HTTP_CODE"
          echo "Body:"; cat /tmp/body.txt
          test "$HTTP_CODE" -eq 200
          grep -q 'ok' /tmp/body.txt

      # 8) Фінальна підказка
      - name: Show final info
        run: |
          echo "Worker: ${{ steps.deploy.outputs.WORKER_URL }}"
          echo "Verify webhook:"
          echo "  curl -s \"https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getWebhookInfo\" | jq ."