name: Deploy Senti Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SCRIPT_NAME: senti-bot-worker
      CF_ACCOUNT_ID: 2cf6e316af8623546c95c0354bc3aa00

      # беремо значення з GitHub Secrets репозиторію
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      WEBHOOK_SECRET:     ${{ secrets.WEBHOOK_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node & Wrangler
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm i -g wrangler@4.38.0

      - name: Create CF Secrets (first run or overwrite)
        shell: bash
        run: |
          set -e
          printf '%s' "$TELEGRAM_BOT_TOKEN" | wrangler secret put TELEGRAM_BOT_TOKEN --name "$SCRIPT_NAME"
          printf '%s' "$WEBHOOK_SECRET"     | wrangler secret put WEBHOOK_SECRET     --name "$SCRIPT_NAME"
          printf '%s' "$CLOUDFLARE_API_TOKEN" | wrangler secret put CLOUDFLARE_API_TOKEN --name "$SCRIPT_NAME"

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy --name "$SCRIPT_NAME"