name: Deploy Senti Worker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # має збігатися з name у wrangler.toml
  SCRIPT_NAME: senti-bot-worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler & jq
        run: |
          npm i -g wrangler@4
          sudo apt-get update -y
          sudo apt-get install -y jq

      # ⚠️ Ідемпотентне створення/оновлення секретів через CF API (без помилки 10053)
      - name: Upsert Cloudflare Worker secrets
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          upsert() {
            KEY="$1"; VALUE="${2-}"
            if [ -z "${VALUE}" ]; then
              echo "::notice title=Skip::$KEY is empty, skipping"
              return 0
            fi
            echo "Upsert secret $KEY…"
            curl -fsS -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}/secrets" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg name "$KEY" --arg text "$VALUE" '{name:$name, text:$text, type:"secret_text"}')"
            echo
          }
          upsert TELEGRAM_BOT_TOKEN "${TELEGRAM_BOT_TOKEN:-}"
          upsert WEBHOOK_SECRET      "${WEBHOOK_SECRET:-}"

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler deploy --minify

      - name: Summary
        run: |
          echo "✅ Deployed $SCRIPT_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets upserted: TELEGRAM_BOT_TOKEN, WEBHOOK_SECRET" >> $GITHUB_STEP_SUMMARY
          echo "- Set Telegram webhook once (manually) to your workers.dev URL with secret_token" >> $GITHUB_STEP_SUMMARY