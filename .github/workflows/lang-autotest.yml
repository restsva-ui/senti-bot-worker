name: Lang Autotest

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'src/utils/i18n.ts'
      - 'scripts/lang-autotest.ts'
      - '.github/workflows/lang-autotest.yml'
  pull_request:
    paths:
      - 'src/utils/i18n.ts'
      - 'scripts/lang-autotest.ts'

concurrency:
  group: langtest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: Europe/Kyiv

jobs:
  lang-autotest:
    name: Run lang-autotest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: Run lang-autotest via tsx
        run: npx --yes tsx scripts/lang-autotest.ts

      - name: Show time (debug)
        run: |
          date
          node -e "console.log(new Date().toString())"