# .github/workflows/sync-secrets.yml
name: Sync Cloudflare Worker Secrets

on:
  workflow_dispatch:
    inputs:
      update_cloudflare_api_token:
        description: "Also sync CLOUDFLARE_API_TOKEN to the Worker (usually not needed)"
        required: false
        default: "false"
  push:
    branches: [ "main" ]
    paths:
      - ".github/workflows/sync-secrets.yml"

permissions:
  contents: read

env:
  SCRIPT_NAME: senti-bot-worker

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure required GitHub Action secrets exist
        run: |
          : "${{ secrets.CF_API_TOKEN?Missing secret: CF_API_TOKEN }}"
          : "${{ secrets.CF_ACCOUNT_ID?Missing secret: CF_ACCOUNT_ID }}"

      - name: Mask sensitive values
        run: |
          for v in TELEGRAM_BOT_TOKEN WEBHOOK_SECRET CLOUDFLARE_API_TOKEN; do
            val="${{ secrets[v] }}"
            if [ -n "$val" ]; then
              echo "::add-mask::$val"
            fi
          done

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Put (create or update) Worker secrets via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          G_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          G_WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          G_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          INPUT_UPDATE_CF_TOKEN: ${{ github.event.inputs.update_cloudflare_api_token }}
        run: |
          set -euo pipefail

          api() {
            local name="$1" text="$2"
            echo "Syncing secret: $name"
            # Build JSON safely without leaking value in logs
            body=$(jq -n --arg n "$name" --arg t "$text" '{name:$n, text:$t}')
            http_code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${SCRIPT_NAME}/secrets" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary @"<(printf '%s' "$body")")
            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "Cloudflare API error ($http_code):"
              cat /tmp/resp.json || true
              exit 1
            fi
            jq -e '.success==true' /tmp/resp.json >/dev/null || { cat /tmp/resp.json; exit 1; }
          }

          # prepare list of pairs key=value taken from GitHub Action secrets (skip empty)
          pairs=()

          if [ -n "${G_TELEGRAM_BOT_TOKEN:-}" ]; then
            pairs+=("TELEGRAM_BOT_TOKEN=$G_TELEGRAM_BOT_TOKEN")
          fi
          if [ -n "${G_WEBHOOK_SECRET:-}" ]; then
            pairs+=("WEBHOOK_SECRET=$G_WEBHOOK_SECRET")
          fi

          # Optional: only sync CLOUDFLARE_API_TOKEN when explicitly requested
          if [ "${INPUT_UPDATE_CF_TOKEN:-false}" = "true" ] && [ -n "${G_CLOUDFLARE_API_TOKEN:-}" ]; then
            pairs+=("CLOUDFLARE_API_TOKEN=$G_CLOUDFLARE_API_TOKEN")
          fi

          if [ ${#pairs[@]} -eq 0 ]; then
            echo "Nothing to sync. Provide TELEGRAM_BOT_TOKEN / WEBHOOK_SECRET (and optionally CLOUDFLARE_API_TOKEN) as GitHub secrets."
            exit 0
          fi

          for kv in "${pairs[@]}"; do
            key="${kv%%=*}"
            val="${kv#*=}"
            api "$key" "$val"
          done

      - name: Show current Worker secret names (no values)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          curl -sS \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${{ env.SCRIPT_NAME }}/secrets" \
            | jq -r 'if .success then (.result[]?.name // empty) else . end'