name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TZ: Europe/Kyiv

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install

      - name: TypeScript check
        run: npx tsc -p .

      - name: Show time (debug)
        run: |
          date
          node -e "console.log(new Date().toString())"